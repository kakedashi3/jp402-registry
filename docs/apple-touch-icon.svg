<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180" role="img" aria-label="jp402">
  <!-- Apple touch icon: 紫タイル + ◎(白環 + 黄芯)。padding 多めで角丸ホーム画面に最適化。 -->
  <rect width="180" height="180" rx="40" fill="#6c5ce7"/>
  <g transform="translate(90 90)" fill="none" stroke="#ffffff">
    <circle r="48" stroke-width="13"/>
    <circle r="20" fill="#ffe27a" stroke="none"/>
  </g>
</svg>
