name: ci
on:
  pull_request:
  push:
    branches: [main]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci || npm install
      - name: schema compiles
        run: node validate.mjs --self
      - name: registry shape
        run: node validate.mjs --registry
      - name: signals shape
        run: node validate.mjs --signals
