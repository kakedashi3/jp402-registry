name: pr-check
on:
  # 全 PR で走らせる（branch ruleset で必須化するため）。registry.json に新規 entry が
  # 無い PR は check-pr.mjs が「✓ 新規 entry なし」で exit 0 する（no-op）。
  pull_request:
jobs:
  check-entries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - run: git fetch origin main
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci || npm install
      - name: 新規 entry を検査(schema 準拠 + resource が 402 を返すか)
        run: node check-pr.mjs
