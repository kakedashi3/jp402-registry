name: pr-check
on:
  pull_request:
    paths: [registry.json]
jobs:
  check-entries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: git fetch origin main
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci || npm install
      - name: 新規 entry を検査(schema 準拠 + resource が 402 を返すか)
        run: node check-pr.mjs
